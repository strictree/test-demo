<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>BIM 高精度检测平台</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; }
        .panel { position: absolute; background: rgba(15, 15, 15, 0.9); padding: 20px; border-radius: 12px; border: 1px solid #444; backdrop-filter: blur(10px); }
        #left-panel { top: 20px; left: 20px; width: 260px; }
        #right-panel { top: 20px; right: 20px; width: 320px; }

        .section-title { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .stat-card { background: #000; padding: 10px; border-radius: 6px; border-left: 4px solid #46F884; margin-bottom: 15px; }
        .max-val { font-size: 24px; font-weight: bold; color: #46F884; }

        /* 直方图样式 */
        #histogram { width: 100%; height: 100px; margin-top: 10px; display: flex; align-items: flex-end; gap: 1px; }
        .bar { background: #46F884; opacity: 0.6; flex: 1; transition: height 0.3s; }

        .slider-group { margin-top: 20px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #46F884; }
        .val-disp { float: right; color: #46F884; font-family: monospace; }

        .layer-toggle { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    </style>
</head>
<body>

    <div id="loading"><h3>正在加载工业级点云数据...</h3></div>

    <div id="left-panel" class="panel">
        <div class="section-title">定量分析摘要</div>
        <div class="stat-card">
            <div style="font-size: 11px;">最大观测偏差 (MAX)</div>
            <div class="max-val"><span id="max-mm">--</span> <small style="font-size: 14px;">mm</small></div>
        </div>

        <div style="font-size: 11px; color: #aaa;">偏差分布直方图</div>
        <div id="histogram"></div>
        <div style="display: flex; justify-content: space-between; font-size: 10px; color: #666; margin-top: 5px;">
            <span>0mm</span><span>15mm</span><span>30mm</span>
        </div>

        <div class="section-title" style="margin-top:25px;">图层管理器</div>
        <div class="layer-toggle"><span>偏差热力图</span><input type="checkbox" id="chk-heat" checked></div>
        <div class="layer-toggle"><span>实测点云 (蓝)</span><input type="checkbox" id="chk-meas"></div>
        <div class="layer-toggle"><span>BIM 模型 (灰)</span><input type="checkbox" id="chk-bim"></div>
    </div>

    <div id="right-panel" class="panel">
        <div class="section-title">SF 显示参数 (实时调节)</div>
        <div class="slider-group">
            <label>显示下限 (Min) <span class="val-disp" id="min-txt">0.0 mm</span></label>
            <input type="range" id="sld-min" min="0" max="25" step="0.1" value="0">
        </div>
        <div class="slider-group">
            <label>显示上限 (Max) <span class="val-disp" id="max-txt">20.0 mm</span></label>
            <input type="range" id="sld-max" min="0" max="25" step="0.1" value="20">
        </div>
        <div style="background: linear-gradient(to right, #30123B, #4145AB, #46F884, #F2A219, #7A0403); height: 8px; border-radius: 4px; margin-top: 15px;"></div>
        <p style="font-size: 11px; color: #666; line-height: 1.4; margin-top: 10px;">
            ※ 滑动可实时过滤误差区间。区间外的点将自动渲染为中性灰色，以便快速锁定缺陷。
        </p>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>

    <script type="module">
        import * as THREE from 'three';
        import { TrackballControls } from 'three/addons/controls/TrackballControls.js';
        import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';

        // --- 1. 初始化场景 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 2, 4);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new TrackballControls(camera, renderer.domElement);

        // --- 2. GPU 实时着色器逻辑 ---
        const vertexShader = `
            attribute vec3 color;
            varying float vDist;
            void main() {
                vDist = color.r;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                gl_PointSize = 0.015 * (400.0 / -mvPosition.z);
            }
        `;
        const fragmentShader = `
            uniform float uMin; uniform float uMax;
            varying float vDist;
            vec3 turbo(float t) {
                const vec4 kRedVec4 = vec4(0.135, 4.615, -42.66, 132.13);
                const vec4 kGreenVec4 = vec4(0.091, 2.194, 4.842, -14.18);
                const vec4 kBlueVec4 = vec4(0.106, 12.64, -60.58, 110.36);
                t = clamp(t, 0.0, 1.0);
                vec4 v4 = vec4(1.0, t, t*t, t*t*t);
                return vec3(dot(v4, kRedVec4), dot(v4, kGreenVec4), dot(v4, kBlueVec4));
            }
            void main() {
                float d = vDist * 20.0; // 还原为 mm
                if (d < uMin || d > uMax) {
                    gl_FragColor = vec4(0.2, 0.2, 0.2, 1.0);
                } else {
                    gl_FragColor = vec4(turbo(d / 20.0), 1.0);
                }
            }
        `;

        const heatMat = new THREE.ShaderMaterial({
            uniforms: { uMin: { value: 0.0 }, uMax: { value: 20.0 } },
            vertexShader, fragmentShader
        });

        const layers = {
            heat: { url: 'layer_encoded.ply', mat: heatMat, mesh: null },
            meas: { url: 'layer_measured.ply', mat: null, mesh: null },
            bim: { url: 'layer_bim.ply', mat: null, mesh: null }
        };

        // --- 3. 加载逻辑 ---
        async function init() {
            // A. 加载统计数据并绘制直方图
            const res = await fetch('heatmap_stats.json');
            const stats = await res.json();
            document.getElementById('max-mm').innerText = stats.max_mm;
            const histDiv = document.getElementById('histogram');
            const maxCount = Math.max(...stats.counts);
            stats.counts.forEach(c => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = (c / maxCount * 100) + '%';
                histDiv.appendChild(bar);
            });

            // B. 加载默认热力图
            loadLayer('heat', true);
            document.getElementById('loading').style.display = 'none';
        }

        function loadLayer(id, show) {
            const l = layers[id];
            if (show) {
                if (l.mesh) l.mesh.visible = true;
                else {
                    new PLYLoader().load(l.url, (geo) => {
                        geo.computeBoundingBox();
                        const center = new THREE.Vector3(); geo.boundingBox.getCenter(center);
                        geo.translate(-center.x, -center.y, -center.z);
                        l.mesh = new THREE.Points(geo, l.mat || new THREE.PointsMaterial({size:0.015, vertexColors:true}));
                        scene.add(l.mesh);
                    });
                }
            } else { if(l.mesh) l.mesh.visible = false; }
        }

        // 事件绑定
        document.getElementById('chk-heat').onchange = (e) => loadLayer('heat', e.target.checked);
        document.getElementById('chk-meas').onchange = (e) => loadLayer('meas', e.target.checked);
        document.getElementById('chk-bim').onchange = (e) => loadLayer('bim', e.target.checked);

        document.getElementById('sld-min').oninput = (e) => {
            heatMat.uniforms.uMin.value = parseFloat(e.target.value);
            document.getElementById('min-txt').innerText = e.target.value + ' mm';
        };
        document.getElementById('sld-max').oninput = (e) => {
            heatMat.uniforms.uMax.value = parseFloat(e.target.value);
            document.getElementById('max-txt').innerText = e.target.value + ' mm';
        };

        init();
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
