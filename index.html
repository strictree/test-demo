<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Precast Element Deviation Report - Interactive</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }

        /* --- Loading Screen Styles --- */
        #loading-screen {
            position: absolute;
            z-index: 9999; /* 置于最顶层 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 0.5s ease; /* 消失时的渐变动画 */
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #46F884;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-title { margin: 0 0 15px 0; font-size: 18px; letter-spacing: 1px; color: #eee; }
        .progress-container {
            width: 300px;
            height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4145AB, #46F884);
            transition: width 0.1s ease;
        }
        #progress-text { font-size: 13px; color: #aaa; font-family: monospace; }

        /* --- Dashboard Overlay --- */
        #ui-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            user-select: none;
            width: 280px;
        }
        .legend-title { margin: 0 0 12px 0; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; color: #aaa; }
        .legend-main { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: block; }
        .color-bar {
            width: 100%;
            height: 12px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #30123B, #4145AB, #46F884, #F2A219, #7A0403);
            border-radius: 2px;
        }
        .labels { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 20px;}

        /* Interactive Controls */
        .control-group { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .control-label { display: block; font-size: 13px; color: #eee; margin-bottom: 8px; }
        input[type=range] { width: 100%; cursor: pointer; }

        /* Bottom Left Hint */
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2 class="loading-title">Loading 3D Point Cloud...</h2>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="progress-text">0%</div>
    </div>

    <div id="ui-overlay">
        <span class="legend-title">Quality Inspection</span>
        <span class="legend-main">Deviation Heatmap</span>
        <div class="color-bar"></div>
        <div class="labels">
            <span>0 mm</span>
            <span>10 mm</span>
            <span>>20 mm</span>
        </div>

        <div class="control-group">
            <label class="control-label">Point Size: <span id="size-val">0.015</span></label>
            <input type="range" id="size-slider" min="0.002" max="0.08" step="0.001" value="0.015">
        </div>
    </div>

    <div id="controls-hint">
        LMB: Rotate | RMB: Pan | Wheel: Zoom | Red:X Green:Y Blue:Z
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TrackballControls } from 'three/addons/controls/TrackballControls.js';
        import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';

        let pointCloud;

        // --- Main Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(3, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.autoClear = false;
        document.body.appendChild(renderer.domElement);

        // --- HUD Scene for Bottom-Right Axes ---
        const axesScene = new THREE.Scene();
        const axesCamera = new THREE.PerspectiveCamera(50, 1, 0.1, 10);
        const axesHelper = new THREE.AxesHelper(1);
        axesScene.add(axesHelper);

        // --- Controls ---
        const controls = new TrackballControls(camera, renderer.domElement);
        controls.rotateSpeed = 4.0;
        controls.staticMoving = true;

        // --- Load PLY with Progress Bar ---
        const loader = new PLYLoader();
        loader.load(
            'result_heatmap.ply',
            // 1. 加载成功 (onLoad)
            (geometry) => {
                geometry.computeBoundingBox();
                const center = new THREE.Vector3();
                geometry.boundingBox.getCenter(center);
                geometry.translate(-center.x, -center.y, -center.z);

                const material = new THREE.PointsMaterial({
                    size: 0.015,
                    vertexColors: true
                });
                pointCloud = new THREE.Points(geometry, material);
                scene.add(pointCloud);

                // 💡 点云渲染完成后，隐藏加载屏幕
                const loadingScreen = document.getElementById('loading-screen');
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 500); // 等待 0.5 秒渐变动画结束
            },
            // 2. 加载进度更新 (onProgress)
            (xhr) => {
                if (xhr.lengthComputable) {
                    const percentComplete = (xhr.loaded / xhr.total) * 100;
                    document.getElementById('progress-bar').style.width = percentComplete + '%';
                    document.getElementById('progress-text').innerText = Math.round(percentComplete) + '% (' + (xhr.loaded / 1024 / 1024).toFixed(1) + ' MB)';
                }
            },
            // 3. 加载出错 (onError)
            (error) => {
                document.getElementById('progress-text').innerText = 'Load failed! Please check console.';
                document.getElementById('progress-bar').style.background = '#ff4444';
                console.error('Error loading PLY:', error);
            }
        );

        // --- UI Interaction ---
        const slider = document.getElementById('size-slider');
        const sizeVal = document.getElementById('size-val');
        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            sizeVal.innerText = val;
            if (pointCloud) {
                pointCloud.material.size = parseFloat(val);
            }
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // 1. Render main scene
            renderer.clear();
            renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
            renderer.render(scene, camera);

            // 2. Render HUD Axes in bottom right
            const axesSize = 120;
            renderer.clearDepth();
            renderer.setScissorTest(true);
            renderer.setScissor(window.innerWidth - axesSize, 0, axesSize, axesSize);
            renderer.setViewport(window.innerWidth - axesSize, 0, axesSize, axesSize);

            axesCamera.position.copy(camera.position);
            axesCamera.position.sub(controls.target);
            axesCamera.position.setLength(3);
            axesCamera.lookAt(0, 0, 0);

            renderer.render(axesScene, axesCamera);
            renderer.setScissorTest(false);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            controls.handleResize();
        });

        animate();
    </script>
</body>
</html>
